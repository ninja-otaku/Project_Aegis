<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #111;
      --border:  #222;
      --muted:   #444;
      --text:    #ccc;
      --accent:  #7ec8e3;
      --green:   #4ade80;
      --yellow:  #facc15;
      --red:     #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }

    h1 { font-size: 1rem; letter-spacing: 0.14em; color: var(--accent); }

    /* ── video ── */
    video {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 4px;
      object-fit: cover;
    }
    canvas { display: none; }

    /* ── status row ── */
    .meta { font-size: 0.72rem; color: var(--muted); min-height: 1.2em; }
    .meta.ok    { color: var(--green); }
    .meta.error { color: var(--red); }

    /* ── shared card ── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      background: #161616;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-header .label { color: var(--accent); letter-spacing: 0.1em; }

    /* ── analysis panel ── */
    #analysis-panel .field {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    #analysis-panel .field:last-child { border-bottom: none; }
    .field-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .field-value { font-size: 0.8rem; color: var(--text); }

    /* threats list */
    .threats-list { list-style: none; }
    .threats-list li::before { content: "▸ "; color: var(--yellow); }
    .threats-list li { font-size: 0.78rem; color: var(--text); }
    .threats-list.empty li { color: var(--muted); font-style: italic; }

    /* recommendation highlight */
    .recommendation {
      background: #0f1f0f;
      border-left: 3px solid var(--green);
      padding: 6px 8px;
      font-size: 0.82rem;
      color: #d0f0d0;
      border-radius: 2px;
    }
    .recommendation.empty { color: var(--muted); font-style: italic; background: none; border-left-color: var(--muted); }

    /* confidence badge */
    .confidence {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .confidence.high   { background: #052a05; color: var(--green); border: 1px solid #1a5c1a; }
    .confidence.medium { background: #2a1f00; color: var(--yellow); border: 1px solid #5c4400; }
    .confidence.low    { background: #2a0505; color: var(--red);    border: 1px solid #5c1a1a; }
    .confidence.none   { background: #1a1a1a; color: var(--muted);  border: 1px solid var(--border); }

    /* thinking animation */
    .thinking { color: var(--muted); font-style: italic; }
    .dot-anim::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
    }

    /* ── history panel ── */
    #history-panel .history-body {
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      cursor: default;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: #161616; }
    .h-ts { font-size: 0.65rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; padding-top: 1px; }
    .h-rec { font-size: 0.75rem; color: var(--text); flex: 1; }
    .h-conf { font-size: 0.65rem; flex-shrink: 0; padding-top: 1px; }
    .h-conf.high   { color: var(--green); }
    .h-conf.medium { color: var(--yellow); }
    .h-conf.low    { color: var(--red); }
    .history-empty { padding: 10px; color: var(--muted); font-style: italic; font-size: 0.75rem; }

    /* ── button ── */
    button {
      padding: 7px 18px;
      background: #1e1e1e;
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: background 0.12s;
    }
    button:hover    { background: #272727; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── status indicator (persistent dot, top-right) ── */
    #status-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted); /* grey = not yet connected */
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.ok         { background: var(--green);  }
    #status-dot.rate_limit { background: var(--yellow); }
    #status-dot.error      { background: var(--red);    }

    /* ── toast notifications ── */
    #toast-container {
      position: fixed;
      top: 28px; /* below the status dot */
      right: 10px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 280px;
      pointer-events: none; /* never block the analysis panel */
    }
    .toast {
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 0.72rem;
      line-height: 1.4;
      animation: toast-in 0.18s ease;
    }
    .toast.error      { background: #2a0505; border: 1px solid var(--red);    color: var(--red);    }
    .toast.rate_limit { background: #2a1f00; border: 1px solid var(--yellow); color: var(--yellow); }
    .toast .t-msg     { display: block; }
    .toast .t-badge   { display: block; font-size: 0.62rem; opacity: 0.6; margin-top: 2px; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0);   }
    }
  </style>
</head>
<body>
  <!-- ── Persistent status indicator + toast area (fixed, top-right) ── -->
  <div id="status-indicator">
    <span id="status-dot" title="Analysis status"></span>
  </div>
  <div id="toast-container"></div>

  <h1>AEGIS</h1>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <p id="intake-status" class="meta">Idle</p>
  <p id="stats"         class="meta"></p>
  <button id="btn">Start Capture</button>

  <!-- ── Analysis panel ── -->
  <div class="card" id="analysis-panel">
    <div class="card-header">
      <span class="label">ANALYSIS</span>
      <span id="analysis-ts">—</span>
    </div>

    <div class="field">
      <div class="field-label">Game State</div>
      <div class="field-value thinking dot-anim" id="game-state">Waiting for frames</div>
    </div>

    <div class="field">
      <div class="field-label">Threats &amp; Opportunities</div>
      <ul class="threats-list empty" id="threats-list">
        <li>None detected</li>
      </ul>
    </div>

    <div class="field">
      <div class="field-label">Recommendation</div>
      <div class="recommendation empty" id="recommendation">—</div>
    </div>

    <div class="field" style="display:flex; align-items:center; gap:8px;">
      <div class="field-label" style="margin:0">Confidence</div>
      <span class="confidence none" id="confidence">—</span>
    </div>
  </div>

  <!-- ── History panel ── -->
  <div class="card" id="history-panel">
    <div class="card-header">
      <span class="label">HISTORY</span>
      <span id="history-count">0 entries</span>
    </div>
    <div class="history-body" id="history-body">
      <div class="history-empty">No history yet.</div>
    </div>
  </div>

  <script>
    "use strict";

    /* ── DOM refs ── */
    const video        = document.getElementById("video");
    const canvas       = document.getElementById("canvas");
    const ctx          = canvas.getContext("2d", { willReadFrequently: true });
    const intakeStatus = document.getElementById("intake-status");
    const statsEl      = document.getElementById("stats");
    const btn          = document.getElementById("btn");

    const gameStateEl    = document.getElementById("game-state");
    const threatsListEl  = document.getElementById("threats-list");
    const recommendEl    = document.getElementById("recommendation");
    const confidenceEl   = document.getElementById("confidence");
    const analysisTsEl   = document.getElementById("analysis-ts");

    const historyBody    = document.getElementById("history-body");
    const historyCount   = document.getElementById("history-count");

    /* ── constants ── */
    const FRAME_INTERVAL_MS = 100;
    // Scale the canvas before encoding — reduces bytes sent to server.
    // 0.5 = half resolution (e.g. 1280×720 → 640×360). Server resizes
    // again via PHONE_FRAME_WIDTH, so this is a client-side pre-filter.
    const CAPTURE_SCALE = 0.5;
    // JPEG quality for WebSocket transmission. Lower = fewer bytes on the wire.
    const JPEG_QUALITY  = 0.6;
    const MAX_HISTORY_ITEMS = 50;

    /* ── intake state ── */
    let intakeWs   = null;
    let intervalId = null;
    let framesSent = 0, bytesTotal = 0, startTime = 0;

    /* ── analysis WS ── */
    let analysisWs        = null;
    let analysisReconnect = null;

    /* ── local history cache ── */
    let historyItems = [];

    /* ================================================================
       Intake WebSocket
    ================================================================ */

    function setIntakeStatus(msg, cls = "") {
      intakeStatus.textContent = msg;
      intakeStatus.className   = "meta " + cls;
    }

    function sendFrame() {
      if (!intakeWs || intakeWs.readyState !== WebSocket.OPEN) return;
      if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA)  return;

      // Apply CAPTURE_SCALE when setting canvas dimensions so the encoded
      // JPEG is already downscaled before hitting the wire.
      const scaledW = Math.round(video.videoWidth  * CAPTURE_SCALE);
      const scaledH = Math.round(video.videoHeight * CAPTURE_SCALE);
      if (canvas.width !== scaledW || canvas.height !== scaledH) {
        canvas.width = scaledW; canvas.height = scaledH;
      }
      ctx.drawImage(video, 0, 0, scaledW, scaledH);

      canvas.toBlob((blob) => {
        if (!blob || !intakeWs || intakeWs.readyState !== WebSocket.OPEN) return;
        blob.arrayBuffer().then((buf) => {
          intakeWs.send(buf);
          framesSent++; bytesTotal += buf.byteLength;
          // Show resolution and quality so it's easy to tune CAPTURE_SCALE / JPEG_QUALITY
          const resLabel = `${scaledW}×${scaledH} @ Q${Math.round(JPEG_QUALITY * 100)}`;
          statsEl.textContent = `${framesSent} frames · ${(bytesTotal/1024).toFixed(1)} KB · ${resLabel}`;
        });
      }, "image/jpeg", JPEG_QUALITY);
    }

    async function startCapture() {
      btn.disabled = true;
      setIntakeStatus("Requesting camera…");
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
      } catch (err) {
        setIntakeStatus(`Camera error: ${err.message}`, "error");
        btn.textContent = "Start Capture"; btn.disabled = false; return;
      }
      video.srcObject = stream;
      const proto = location.protocol === "https:" ? "wss" : "ws";
      intakeWs = new WebSocket(`${proto}://${location.host}/ws/intake`);
      intakeWs.binaryType = "arraybuffer";
      intakeWs.onopen  = () => {
        setIntakeStatus("Streaming", "ok");
        btn.textContent = "Stop Capture"; btn.disabled = false;
        framesSent = bytesTotal = 0; startTime = Date.now();
        intervalId = setInterval(sendFrame, FRAME_INTERVAL_MS);
      };
      intakeWs.onclose = () => { stopCapture(true); setIntakeStatus("Disconnected", "error"); };
      intakeWs.onerror = () => setIntakeStatus("WebSocket error", "error");
    }

    function stopCapture(fromServer = false) {
      clearInterval(intervalId); intervalId = null;
      if (intakeWs && intakeWs.readyState <= WebSocket.OPEN) intakeWs.close();
      intakeWs = null;
      const stream = video.srcObject;
      if (stream) stream.getTracks().forEach((t) => t.stop());
      video.srcObject = null;
      if (!fromServer) setIntakeStatus("Stopped");
      btn.textContent = "Start Capture"; btn.disabled = false;
    }

    btn.addEventListener("click", () => {
      if (intakeWs) stopCapture();
      else { btn.textContent = "Starting…"; startCapture(); }
    });

    /* ================================================================
       Analysis rendering
    ================================================================ */

    function formatTs(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function renderAnalysis(r) {
      /* game state */
      gameStateEl.classList.remove("thinking", "dot-anim");
      gameStateEl.textContent = r.game_state || "—";

      /* threats */
      const threats = Array.isArray(r.threats) ? r.threats : [];
      threatsListEl.innerHTML = "";
      threatsListEl.classList.toggle("empty", threats.length === 0);
      if (threats.length === 0) {
        threatsListEl.innerHTML = "<li>None detected</li>";
      } else {
        threats.forEach((t) => {
          const li = document.createElement("li");
          li.textContent = t;
          threatsListEl.appendChild(li);
        });
      }

      /* recommendation */
      const rec = r.recommendation || "";
      recommendEl.textContent = rec || "—";
      recommendEl.classList.toggle("empty", !rec);

      /* confidence */
      const conf = (r.confidence || "").toLowerCase();
      confidenceEl.textContent = conf || "—";
      confidenceEl.className   = `confidence ${conf || "none"}`;

      /* timestamp */
      analysisTsEl.textContent = formatTs(r.timestamp);
    }

    function prependHistory(r) {
      historyItems.unshift(r);
      if (historyItems.length > MAX_HISTORY_ITEMS) historyItems.pop();
      rebuildHistory();
    }

    function rebuildHistory() {
      if (historyItems.length === 0) {
        historyBody.innerHTML = '<div class="history-empty">No history yet.</div>';
        historyCount.textContent = "0 entries";
        return;
      }
      historyCount.textContent = `${historyItems.length} entr${historyItems.length === 1 ? "y" : "ies"}`;
      historyBody.innerHTML = "";
      historyItems.forEach((r) => {
        const div = document.createElement("div");
        div.className = "history-item";
        const conf = (r.confidence || "").toLowerCase();
        div.innerHTML = `
          <span class="h-ts">${formatTs(r.timestamp)}</span>
          <span class="h-rec">${r.recommendation || r.game_state || "—"}</span>
          <span class="h-conf ${conf}">${conf || "—"}</span>`;
        historyBody.appendChild(div);
      });
    }

    /* ================================================================
       Status dot + toast helpers
    ================================================================ */

    const statusDot = document.getElementById("status-dot");
    const toastContainer = document.getElementById("toast-container");
    const TOAST_DURATION_MS = 5000;

    function setStatus(state /* "ok" | "rate_limit" | "error" */) {
      statusDot.className = state;
    }

    function showToast(message, type /* "error" | "rate_limit" */, provider) {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.innerHTML =
        `<span class="t-msg">${message}</span>` +
        (provider ? `<span class="t-badge">[${provider}]</span>` : "");
      toastContainer.appendChild(el);
      // Auto-dismiss after TOAST_DURATION_MS.
      setTimeout(() => el.remove(), TOAST_DURATION_MS);
    }

    /* ================================================================
       Analysis WebSocket
    ================================================================ */

    function connectAnalysisWs() {
      clearTimeout(analysisReconnect);
      const proto = location.protocol === "https:" ? "wss" : "ws";
      analysisWs = new WebSocket(`${proto}://${location.host}/ws/analysis`);

      analysisWs.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "keepalive") return;

        // ── Error payloads from the backend ──────────────────────────
        if (msg.status === "error") {
          if (msg.error_type === "rate_limit") {
            // Yellow toast for rate limits — a retry is already in flight.
            setStatus("rate_limit");
            showToast(msg.message, "rate_limit", msg.provider);
          } else {
            // Red toast for all other errors.
            setStatus("error");
            showToast(msg.message, "error", msg.provider);
          }
          return; // do not update the analysis panel with an error payload
        }

        // ── Normal analysis result ────────────────────────────────────
        setStatus("ok");
        renderAnalysis(msg);
        prependHistory(msg);
      };

      analysisWs.onopen = () => setStatus("ok");
      analysisWs.onclose = () => {
        analysisReconnect = setTimeout(connectAnalysisWs, 3000);
      };
      analysisWs.onerror = () => analysisWs.close();
    }

    /* Fetch existing history from REST on first load. */
    fetch("/history")
      .then((r) => r.json())
      .then(({ history }) => {
        if (!Array.isArray(history) || history.length === 0) return;
        historyItems = history.slice(0, MAX_HISTORY_ITEMS);
        rebuildHistory();
        renderAnalysis(historyItems[0]);
      })
      .catch(() => {}); // non-fatal

    connectAnalysisWs();
  </script>
</body>
</html>
